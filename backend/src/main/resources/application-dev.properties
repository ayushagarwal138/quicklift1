spring.datasource.url=${DB_URL:jdbc:h2:mem:quickliftdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL}
spring.datasource.driverClassName=${DB_DRIVER:org.h2.Driver}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.database-platform=${JPA_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=create-drop
spring.flyway.enabled=false

jwt.secret=${JWT_SECRET:dev-secret-key-for-local-quicklift-only-change-before-production-1234567890}
jwt.access-token-expiration-seconds=${JWT_ACCESS_EXPIRATION_SECONDS:900}
jwt.refresh-token-expiration-days=${JWT_REFRESH_EXPIRATION_DAYS:30}

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true

app.auth.refresh-cookie-secure=${REFRESH_COOKIE_SECURE:false}
