spring.application.name=quicklift-backend

server.servlet.context-path=
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never
server.tomcat.max-http-form-post-size=1MB
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB

spring.datasource.url=${DB_URL}
spring.datasource.driverClassName=${DB_DRIVER:org.postgresql.Driver}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.database-platform=${JPA_DIALECT:org.hibernate.dialect.PostgreSQLDialect}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.flyway.enabled=true

jwt.secret=${JWT_SECRET}
jwt.access-token-expiration-seconds=${JWT_ACCESS_EXPIRATION_SECONDS:900}
jwt.refresh-token-expiration-days=${JWT_REFRESH_EXPIRATION_DAYS:30}

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
app.auth.refresh-cookie-name=${REFRESH_COOKIE_NAME:quicklift_refresh}
app.auth.refresh-cookie-secure=${REFRESH_COOKIE_SECURE:true}
app.auth.frontend-success-url=${FRONTEND_SUCCESS_URL:http://localhost:5173}
app.auth.frontend-error-url=${FRONTEND_ERROR_URL:http://localhost:5173/login}

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

springdoc.swagger-ui.enabled=${SWAGGER_UI_ENABLED:false}
springdoc.api-docs.enabled=${OPENAPI_ENABLED:false}
